name: Deploy Dashboard to Plesk

on:
  push:
    branches: [main]
    paths:
      - 'dashboard-app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: dashboard-app
        run: |
          npm install
          npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Sync dist to Plesk via FTPS (preserve data/)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          timeout 600 lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ftp:passive-mode on;
          set ftp:fix-pasv-address yes;
          set ssl:verify-certificate no;
          set net:timeout 20;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;
          debug 1;
          open -u '$FTP_USER','$FTP_PASSWORD' ftp://$FTP_HOST;
          mirror --reverse --delete --verbose --exclude='^data/' --exclude='^data$' dashboard-app/dist /dashboard.pandevida.engineering;
          bye
          "
