name: Sync Salesforce to Dashboard

on:
  schedule:
    # 10:00 UTC and 22:00 UTC = ~6 AM and 6 PM Eastern Time (US)
    # GitHub cron is UTC and does not adjust for DST.
    - cron: '0 10,22 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sync deps
        working-directory: scripts
        run: npm install

      - name: Write Salesforce private key
        env:
          SF_PRIVATE_KEY: ${{ secrets.SF_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$SF_PRIVATE_KEY" > scripts/server.key
          chmod 600 scripts/server.key

      - name: Run Salesforce sync
        working-directory: scripts
        env:
          SF_LOGIN_URL: https://login.salesforce.com
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_PRIVATE_KEY_PATH: ./server.key
          OUTPUT_PATH: ../dashboard.json
        run: node sync-salesforce.js

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload dashboard.json to Plesk via FTPS
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          timeout 120 lftp -c "
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ftp:passive-mode on;
          set ftp:fix-pasv-address yes;
          set ssl:verify-certificate no;
          set net:timeout 20;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;
          debug 1;
          open -u '$FTP_USER','$FTP_PASSWORD' ftp://$FTP_HOST;
          put dashboard.json -o /dashboard.pandevida.engineering/data/dashboard.json;
          bye
          "
